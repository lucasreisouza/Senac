<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro de Usuários</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <form id="formCadastro">
      <h1 class="title">Cadastro de Usuários</h1>

      <div class="campos">
        <div class="grupo">
          <label for="inputNome">Nome</label>
          <input type="text" id="inputNome" placeholder="Digite o nome" />
        </div>

        <div class="grupo">
          <label for="inputIdade">Idade</label>
          <input type="number" id="inputIdade" placeholder="Digite a idade" />
        </div>
      </div>

      <div class="botoes">
        <button type="submit" id="btnAdicionar">Adicionar</button>
        <button type="button" id="btnLimpar">Limpar Lista</button>
      </div>

      <div id="areaResultado"></div>
    </form>

    <div id="areaLista">
      <h2 id="tituloLista" class="oculto">Usuários cadastrados</h2>
      <ul id="listaUsuarios"></ul>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
